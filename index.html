            <defs>

                <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.6"/>
              </linearGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="2" result="blur"/>
                <feMerge>
                  <feMergeNode in="blur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>

            <ellipse cx="100" cy="85" rx="60" ry="55" fill="url(#aiGlow)" opacity="0.25" filter="url(#glow)"/>
